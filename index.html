<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điểm Danh Phân Loại Theo Thứ và Khối</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #050508; color: #e0e0e6; padding: 30px 3px 20px 3px; max-width: 600px; margin: 0 auto; }
        
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; color: #00f0ff; text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); font-size: 1.3rem; }
        h3 { color: #ff007f; text-shadow: 0 0 10px rgba(255, 0, 127, 0.5); font-size: 1.1rem; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        
        /* 📂 KHU VỰC TẢI FILE */
        .upload-card { background: #0a0a14; border: 1px solid #ffd700; border-radius: 6px; padding: 15px 10px; margin-bottom: 15px; box-shadow: 0 0 10px rgba(255, 215, 0, 0.1); }
        .btn-group-top { width: 100%; display: block; text-align: center; margin-bottom: 5px; }
        
        .custom-upload-btn { 
            display: inline-block; width: 48%; background: transparent; border: 1px solid #00f0ff; color: #00f0ff; 
            padding: 12px 5px; font-weight: bold; font-size: 0.85rem; border-radius: 25px; cursor: pointer; 
            text-transform: uppercase; text-align: center; margin-right: 2%; box-shadow: 0 0 8px rgba(0, 240, 255, 0.2);
        }
        .custom-upload-btn:active { background: #00f0ff; color: #000; }
        
        .btn-danger-top { 
            display: inline-block; width: 48%; background: transparent; border: 1px solid #ff007f; color: #ff007f; 
            padding: 12px 5px; font-weight: bold; font-size: 0.85rem; border-radius: 20px; cursor: pointer; 
            text-transform: uppercase; text-align: center; box-shadow: 0 0 8px rgba(255, 0, 127, 0.2);
        }
        .btn-danger-top:active { background: #ff007f; color: #fff; }
        .file-status { font-size: 0.85rem; color: #ffd700; text-align: center; margin-top: 12px; font-weight: bold; line-height: 1.3; white-space: pre-line; }
        
        /* ⏳ PROGRESS BAR */
        .progress-container { width: 100%; background-color: #050508; border: 1px solid #333; border-radius: 4px; margin: 10px 0; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 16px; background-color: #00ff66; text-align: center; line-height: 16px; color: #000; font-weight: bold; font-size: 0.75rem; transition: width 0.1s ease; box-shadow: 0 0 10px #00ff66; }

        /* 🔍 KHU VỰC TÌM KIẾM HỌC VIÊN CHUNG */
        .search-box { display: block; background: #0d0d1a; border: 1px solid #333; border-radius: 4px; padding: 10px; margin-bottom: 15px; text-align: center; }
        .search-input { width: 73%; background: #050508; border: 1px solid #333; color: #fff; padding: 10px; font-size: 0.9rem; border-radius: 4px; outline: none; margin-right: 2%; display: inline-block; vertical-align: middle; }
        .search-input:focus { border-color: #ffd700; }
        .search-btn { width: 23%; background: #ffd700; color: #000; border: none; padding: 11px 0; font-weight: bold; font-size: 0.85rem; border-radius: 4px; cursor: pointer; text-transform: uppercase; display: inline-block; vertical-align: middle; }

        /* 📊 KẾT QUẢ TÌM KIẾM TRÊN BẢNG */
        .search-result-panel { background: #1a0813; border: 1px dashed #ff007f; border-radius: 4px; padding: 12px 8px; margin-bottom: 15px; display: none; }
        .result-title { color: #ff007f; font-weight: bold; font-size: 0.9rem; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .result-table { width: 100%; border-collapse: collapse; }
        .result-table th, .result-table td { border: 1px solid rgba(255, 0, 127, 0.2); padding: 8px 5px; text-align: left; font-size: 0.8rem; }
        .result-table th { background-color: #4a0025; color: #fff; text-transform: uppercase; font-size: 0.75rem; }

        /* 📦 KHỐI NHÓM THỨ TRONG TUẦN */
        .group-block-wrapper { margin-bottom: 15px; background: #04040a; border: 1px solid #00f0ff; border-radius: 6px; overflow: hidden; box-shadow: 0 0 10px rgba(0, 240, 255, 0.05); }
        .group-accordion-header { padding: 14px 10px; background: #111122; cursor: pointer; user-select: none; border-bottom: 2px solid #00f0ff; display: flex; justify-content: space-between; align-items: center; }
        .group-accordion-header::after { content: '▼'; color: #00f0ff; font-size: 0.85rem; transition: transform 0.3s; margin-left: 10px; }
        .group-block-wrapper.active .group-accordion-header::after { content: '▲'; }
        .group-main-title { color: #00f0ff; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; text-shadow: 0 0 8px rgba(0, 240, 255, 0.2); }
        .group-stats { color: #aaa; font-size: 0.8rem; font-weight: bold; }
        .group-panel { padding: 10px 5px; display: none; background: #06060c; }
        .group-block-wrapper.active .group-panel { display: block; }

        /* 🏫 KHỐI GIAO DIỆN LỚP CON */
        .class-block-wrapper { margin-bottom: 10px; background: #0a0a14; border: 1px solid #333; border-radius: 4px; overflow: hidden; }
        .class-accordion-header { padding: 12px 10px; background: #0d0d1f; cursor: pointer; position: relative; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .class-accordion-header::after { content: '▼'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #ffd700; font-size: 0.75rem; }
        .class-block-wrapper.active .class-accordion-header::after { content: '▲'; color: #00ff66; }
        
        .class-header-row { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px; margin-bottom: 4px; padding-right: 20px; }
        .class-main-title { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); font-size: 1.05rem; text-transform: uppercase; font-weight: bold; }
        .class-extra-inline { color: #00f0ff; text-shadow: 0 0 8px rgba(0, 240, 255, 0.3); font-size: 0.9rem; font-weight: 500; }
        
        .class-schedule { color: #fff; font-size: 0.85rem; opacity: 0.95; margin-bottom: 3px; line-height: 1.4; }
        .class-stats { text-align: left; color: #00ff66; font-size: 0.75rem; font-weight: 500; }
        
        .class-panel { padding: 12px 6px; display: none; background: #0a0a14; }
        .class-block-wrapper.active .class-panel { display: block; }
        
        .add-student-box { display: flex; flex-direction: column; gap: 6px; background: #0d0d1a; border: 1px solid #ffd700; border-radius: 4px; padding: 10px; margin-bottom: 12px; }
        .add-student-box input { width: 100%; background: #050508; border: 1px solid #333; color: #fff; padding: 8px; font-size: 0.85rem; border-radius: 4px; outline: none; }
        .btn-add { background: #ffd700; color: #000; border: none; padding: 9px; font-weight: bold; font-size: 0.85rem; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        
        .absent-section { background: rgba(255, 0, 127, 0.05); border: 1px dashed #ff007f; border-radius: 4px; padding: 8px; margin-bottom: 15px; }
        .absent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .absent-title { color: #ff007f; font-weight: bold; font-size: 0.85rem; }
        .copy-btn { background: #ff007f; color: #fff; border: none; padding: 4px 10px; font-size: 0.75rem; font-weight: bold; border-radius: 3px; cursor: pointer; }
        .absent-list { list-style: none; font-size: 0.85rem; color: #ff55a5; line-height: 1.4; }
        
        .student-list { display: flex; flex-direction: column; gap: 8px; }
        .student-card { background: #121224; border: 1px solid #333; border-left: 4px solid #00f0ff; border-radius: 4px; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .student-card.status-absent { border-left-color: #ff007f; background: #1a0813; }
        .student-card.status-present { border-left-color: #00ff66; background: #081a10; }
        .student-card.highlight-search { border: 1px solid #ffd700 !important; box-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }
        
        .student-info-row { display: flex; justify-content: space-between; align-items: center; gap: 6px; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .student-meta { display: flex; flex-direction: column; flex: 1; }
        .student-name { font-weight: bold; font-size: 0.9rem; color: #fff; }
        .student-phone { font-size: 0.75rem; color: #888; }
        
        .student-actions-right { display: flex; gap: 5px; }
        .btn-call { background: #ffd700; color: #000; padding: 6px 10px; font-size: 0.8rem; border: none; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #4a0000; color: #ff3333; border: 1px solid #ff3333; padding: 6px 8px; font-size: 0.8rem; border-radius: 4px; cursor: pointer; }
        
        .student-controls-row { display: flex; gap: 6px; align-items: center; }
        .btn-action { flex: 1; padding: 8px 2px; font-size: 0.75rem; font-weight: bold; border: none; border-radius: 3px; cursor: pointer; text-align: center; color: #fff; background: #333; }
        .btn-absent { background: #4a0025; color: #ff007f; border: 1px solid #ff007f; }
        .btn-absent.active { background: #ff007f; color: #fff; box-shadow: 0 0 8px #ff007f; }
        .btn-present { background: #003311; color: #00ff66; border: 1px solid #00ff66; }
        .btn-present.active { background: #00ff66; color: #000; box-shadow: 0 0 8px #00ff66; }
        .note-select { flex: 1.4; background: #1a1a3a; color: #00f0ff; border: 1px solid #00f0ff; padding: 7px 2px; font-size: 0.75rem; border-radius: 3px; outline: none; }
        
        .empty-alert { text-align: center; padding: 30px 10px; color: #555; font-style: italic; font-size: 0.9rem; }
    </style>
</head>
<body>

<h2>HỆ THỐNG ĐIỂM DANH THEO CỘT SHEET L</h2>

<div class="upload-card">
    <div class="btn-group-top">
        <label for="excelFileInput" class="custom-upload-btn">📂 Tải lên File Excel</label>
        <input type="file" id="excelFileInput" accept=".xlsx, .xls" style="display: none;" onchange="startProcessingExcel(this)">
        <button class="btn-danger-top" onclick="clearSystemCache()"> XÓA dữ liệu CŨ</button>
    </div>
    <div id="fileStatusMessage" class="file-status">Chưa có dữ liệu học viên. Vui lòng chọn tệp Excel.</div>
</div>

<div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar">0%</div>
</div>

<div class="search-box">
    <input type="text" id="globalSearchInput" class="search-input" placeholder="Nhập tên hoặc số điện thoại để tìm học viên..." onkeypress="handleSearchKeyPress(event)">
    <button class="search-btn" onclick="searchGlobalStudent()">Tìm</button>
</div>

<div id="searchResultBox" class="search-result-panel">
    <div class="result-title">
        <span>🔍 KẾT QUẢ TÌM KIẾM TOÀN HỆ THỐNG:</span>
        <span id="resultCount" style="color: #ffd700;"></span>
    </div>
    <table class="result-table">
        <thead>
            <tr>
                <th>Họ và Tên</th>
                <th>SĐT</th>
                <th>Lớp Học</th>
                <th>Gọi</th>
            </tr>
        </thead>
        <tbody id="resultTableBody"></tbody>
    </table>
</div>

<div id="dynamicMainContainer">
    <div class="empty-alert">Danh sách trống. Hệ thống đang đợi bạn nạp file Excel để phân chia lớp tự động theo cột!</div>
</div>

<script>
window.masterStudentsDatabase = {}; 
window.daySchedulesStructure = {
    "THU_2": { name: "Thứ Hai", classes: [] },
    "THU_3": { name: "Thứ Ba", classes: [] },
    "THU_4": { name: "Thứ Tư", classes: [] },
    "THU_5": { name: "Thứ Năm", classes: [] },
    "THU_6": { name: "Thứ Sáu", classes: [] },
    "THU_7": { name: "Thứ Bảy", classes: [] },
    "CHU_NHAT": { name: "Chủ Nhật", classes: [] }
};

const targetDataSheets = ["SV", "12", "11", "10", "9", "8", "7", "6", "5", "4", "3", "2", "DH25", "DH26"];
const hardcodedDayKeysOrder = ["THU_2", "THU_3", "THU_4", "THU_5", "THU_6", "THU_7", "CHU_NHAT"];

function displayPhone(p) { 
    if(!p || p === 'Chưa có' || p === 'undefined') return 'Chưa có';
    let c = p.toString().replace(/\s+/g, ''); 
    if(c.length === 10) return c.substring(0,4) + ' ' + c.substring(4,7) + ' ' + c.substring(7);
    return p; 
}

// Hàm dự phòng khi mất kết nối mạng
function loadLocalCacheBackup() {
    const cachedDb = localStorage.getItem("master_students_db");
    const cachedStruct = localStorage.getItem("day_schedules_struct");
    if (cachedDb && cachedStruct) {
        window.masterStudentsDatabase = JSON.parse(cachedDb);
        window.daySchedulesStructure = JSON.parse(cachedStruct);
        window.renderSystemUIByDay();
    }
}

function startProcessingExcel(input) {
    const file = input.files[0];
    if (!file) return;

    document.getElementById('fileStatusMessage').innerText = "Đang bóc tách riêng từng cột của Thứ trong Sheet L...";
    document.getElementById('progressContainer').style.display = 'block';
    document.getElementById('progressBar').style.width = '10%';

    // SAO LƯU TRẠNG THÁI HỌC SINH CŨ (Tên + SĐT để map)
    const oldStudentsMemoryMap = {};
    Object.keys(window.masterStudentsDatabase).forEach(classKey => {
        if (window.masterStudentsDatabase[classKey] && window.masterStudentsDatabase[classKey].students) {
            window.masterStudentsDatabase[classKey].students.forEach(std => {
                let uniqueKey = `${std.name.trim().toLowerCase()}_${std.phone.toString().trim()}`;
                oldStudentsMemoryMap[uniqueKey] = {
                    status: std.status || "present",
                    note: std.note || ""
                };
            });
        }
    });

    window.masterStudentsDatabase = {};
    Object.keys(window.daySchedulesStructure).forEach(k => window.daySchedulesStructure[k].classes = []);

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            
            const sheetL = workbook.Sheets["L"];
            if (!sheetL) {
                alert("Không tìm thấy Sheet 'L'!");
                document.getElementById('progressContainer').style.display = 'none';
                return;
            }

            const range = XLSX.utils.decode_range(sheetL['!ref']);
            let colToDayMap = {};
            let foundDaysRow = false;

            for (let r = range.s.r; r <= Math.min(range.e.r, 5); r++) {
                for (let c = range.s.c; c <= range.e.c; c++) {
                    let cellRef = XLSX.utils.encode_cell({ r: r, c: c });
                    let cell = sheetL[cellRef];
                    if (!cell || !cell.v) continue;
                    
                    let cellVal = cell.v.toString().trim().toUpperCase();
                    let currentKey = "";
                    if (cellVal.includes("THỨ 2") || cellVal === "T2") currentKey = "THU_2";
                    else if (cellVal.includes("THỨ 3") || cellVal === "T3") currentKey = "THU_3";
                    else if (cellVal.includes("THỨ 4") || cellVal === "T4") currentKey = "THU_4";
                    else if (cellVal.includes("THỨ 5") || cellVal === "T5") currentKey = "THU_5";
                    else if (cellVal.includes("THỨ 6") || cellVal === "T6") currentKey = "THU_6";
                    else if (cellVal.includes("THỨ 7") || cellVal === "T7") currentKey = "THU_7";
                    else if (cellVal.includes("CN") || cellVal.includes("CHỦ NHẬT")) currentKey = "CHU_NHAT";

                    if (currentKey) {
                        colToDayMap[c] = currentKey; 
                        foundDaysRow = true;
                    }
                }
                if (foundDaysRow) break;
            }

            for (let r = range.s.r; r <= range.e.r; r++) {
                let roomRef = XLSX.utils.encode_cell({ r: r, c: 1 });
                let roomCell = sheetL[roomRef];
                let roomLocation = (roomCell && roomCell.v) ? roomCell.v.toString().trim() : "";

                for (let c = range.s.c; c <= range.e.c; c++) {
                    let dayKey = colToDayMap[c];
                    if (!dayKey) continue;

                    let cellRef = XLSX.utils.encode_cell({ r: r, c: c });
                    let cell = sheetL[cellRef];
                    if (!cell || !cell.v) continue;

                    let text = cell.v.toString().trim();
                    let textLower = text.toLowerCase();
                    
                    if (textLower.includes("sun") || textLower.includes("kid") || textLower.includes("like") || textLower.includes("kind") || textLower.includes("svip") || text.startsWith("E") || textLower.includes("ielts") || textLower.includes("high")) {
                        let cleanClassName = text.split("\n")[0].trim();
                        
                        let extraRef = XLSX.utils.encode_cell({ r: r, c: c + 1 });
                        let extraCell = sheetL[extraRef];
                        let extraInfo = (extraCell && extraCell.v) ? extraCell.v.toString().trim() : "";

                        let classPayload = {
                            classNameKey: cleanClassName,
                            room: roomLocation,
                            scheduleAndTeacher: extraInfo,
                            rowIndex: r
                        };

                        let isExist = window.daySchedulesStructure[dayKey].classes.some(cls => cls.classNameKey === cleanClassName && cls.rowIndex === r);
                        if (!isExist && cleanClassName.length > 1) {
                            window.daySchedulesStructure[dayKey].classes.push(classPayload);
                        }
                    }
                }
            }

            document.getElementById('progressBar').style.width = '40%';
            document.getElementById('fileStatusMessage').innerText = "Đang nạp danh sách học sinh từ các Sheet khối...";

            const sheetsToProcess = workbook.SheetNames.filter(name => targetDataSheets.includes(name.trim()));
            let totalSheets = sheetsToProcess.length;
            let currentSheetIdx = 0;

            async function parseSheetStep() {
                if (currentSheetIdx >= totalSheets) {
                    document.getElementById('progressBar').style.width = '100%';
                    
                    localStorage.setItem('master_students_db', JSON.stringify(window.masterStudentsDatabase));
                    localStorage.setItem('day_schedules_struct', JSON.stringify(window.daySchedulesStructure));
                    localStorage.setItem('big_classes_filename', file.name);
                    
                    await saveDatabaseState();
                    window.renderSystemUIByDay();

                    let countTotal = 0;
                    Object.keys(window.masterStudentsDatabase).forEach(k => countTotal += window.masterStudentsDatabase[k].students.length);
                    document.getElementById('fileStatusMessage').innerText = `✅ Đã phân tách thành công lịch trình theo từng cột!\nTập hợp được tổng số ${countTotal} học sinh từ các khối.`;
                    return;
                }

                const sheetName = sheetsToProcess[currentSheetIdx];
                const sheet = workbook.Sheets[sheetName];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });
                
                if (rows.length > 0) {
                    let detectedClassName = "";
                    let detectedSchedule = "";
                    let previousText = "";
                    let readingStudents = false;

                    rows.forEach((row) => {
                        if (!row) return;
                        let cellB = row[1] ? row[1].toString().trim() : "";
                        let cellP = row[16] ? row[16].toString().trim() : "";
                        let cellB_lower = cellB.toLowerCase();
                        let cleanPhone = cellP.replace(/[^0-9]/g, "");
                        if (cleanPhone.length === 9 && !cleanPhone.startsWith("0")) cleanPhone = "0" + cleanPhone;

                        if (cellB === "" || cellB_lower === "tên học sinh" || cellB_lower === "tên hs" || cellB_lower === "họ và tên" || cellB_lower === "tt") return;

                        const isSchedule = /^t[2-7]/i.test(cellB) || /^cn/i.test(cellB) || /18h|19h|20h/i.test(cellB) || cellB.includes("THỨ");

                        if (isSchedule) {
                            if (previousText) detectedClassName = previousText;
                            detectedSchedule = cellB;
                            readingStudents = true;
                            return;
                        }

                        if (readingStudents) {
                            if (cellB && !/^\d+$/.test(cellB) && cleanPhone.length >= 9 && cleanPhone.length <= 11) {
                                let classKeyUpper = (detectedClassName || "LỚP CHƯA ĐẶT TÊN").toUpperCase();
                                if (!window.masterStudentsDatabase[classKeyUpper]) {
                                    window.masterStudentsDatabase[classKeyUpper] = {
                                        sheet: sheetName,
                                        schedule: detectedSchedule,
                                        students: []
                                    };
                                }

                                let uniqueMatchKey = `${cellB.trim().toLowerCase()}_${cleanPhone.trim()}`;
                                let defaultStatus = "present";
                                let defaultNote = "";

                                if (oldStudentsMemoryMap[uniqueMatchKey]) {
                                    defaultStatus = oldStudentsMemoryMap[uniqueMatchKey].status;
                                    defaultNote = oldStudentsMemoryMap[uniqueMatchKey].note;
                                }

                                window.masterStudentsDatabase[classKeyUpper].students.push({
                                    id: window.masterStudentsDatabase[classKeyUpper].students.length + 1,
                                    name: cellB,
                                    phone: cleanPhone,
                                    status: defaultStatus,  
                                    note: defaultNote       
                                });
                                return;
                            }
                            if (cellB && cleanPhone.length < 9) {
                                readingStudents = false;
                                { previousText = cellB; return; }
                            }
                            return;
                        }
                        if (cellB && cleanPhone.length < 9) previousText = cellB;
                    });
                }

                currentSheetIdx++;
                let percent = Math.round((currentSheetIdx / totalSheets) * 60) + 40;
                document.getElementById('progressBar').style.width = percent + '%';
                setTimeout(parseSheetStep, 15);
            }
            parseSheetStep();

        } catch (err) {
            console.error(err);
            alert("Lỗi cấu trúc tệp Excel!");
        }
    };
    reader.readAsArrayBuffer(file);
}

function findStudentDataMatch(classNameKey) {
    let keys = Object.keys(window.masterStudentsDatabase);
    let str1 = classNameKey.toUpperCase().replace(/[^A-Z0-9]/g, " ");
    let words1 = str1.split(/\s+/).filter(w => w.length > 1 && w !== "LỚP" && w !== "KHỐI");

    for (let k of keys) {
        let str2 = k.toUpperCase().replace(/[^A-Z0-9]/g, " ");
        let words2 = str2.split(/\s+/).filter(w => w.length > 1);
        
        let intersect = words1.filter(w => words2.includes(w));
        if (intersect.some(w => !/^\d+$/.test(w) && w !== "SL" && w !== "GV")) {
            return { fullKey: k, data: window.masterStudentsDatabase[k] };
        }
    }
    return null;
}

window.renderSystemUIByDay = function() {
    const mainContainer = document.getElementById("dynamicMainContainer");
    
    // Giữ trạng thái đóng mở của các thẻ accordion hiện tại để tránh bị giật màn hình khi đồng bộ thời gian thực
    const openedDomIds = [];
    document.querySelectorAll('.class-block-wrapper.active, .group-block-wrapper.active').forEach(el => {
        if (el.id) openedDomIds.push(el.id);
    });

    mainContainer.innerHTML = "";

    let hasData = hardcodedDayKeysOrder.some(k => window.daySchedulesStructure[k] && window.daySchedulesStructure[k].classes.length > 0);
    if (!hasData) {
        mainContainer.innerHTML = '<div class="empty-alert">Danh sách trống. Hệ thống đang đợi bạn nạp file Excel để phân chia lớp tự động theo cột!</div>';
        return;
    }

    hardcodedDayKeysOrder.forEach(dayKey => {
        const dayGroup = window.daySchedulesStructure[dayKey];
        if (!dayGroup || dayGroup.classes.length === 0) return; 

        dayGroup.classes.sort((a, b) => {
            let rA = a.rowIndex !== undefined ? a.rowIndex : 9999;
            let rB = b.rowIndex !== undefined ? b.rowIndex : 9999;
            return rA - rB;
        });

        const daySection = document.createElement("div");
        daySection.className = "group-block-wrapper";
        daySection.id = `day-wrapper-${dayKey}`;
        
        daySection.innerHTML = `
            <div class="group-accordion-header" onclick="toggleAccordion(this)">
                <div class="group-panel-title-wrapper">
                    <div class="group-main-title">${dayGroup.name}</div>
                </div>
                <div class="group-stats" id="stats-summary-${dayKey}">Số lớp: ${dayGroup.classes.length}</div>
            </div>
            <div class="group-panel"></div>
        `;
        mainContainer.appendChild(daySection);
        const groupPanel = daySection.querySelector(".group-panel");

        dayGroup.classes.forEach((clsObj, idx) => {
            const studentMatch = findStudentDataMatch(clsObj.classNameKey);
            let studentList = [];

            let roomText = clsObj.room ? "📍 Vị trí: " + clsObj.room : "📍 Vị trí: Chưa rõ";

            // Mã hóa an toàn tiêu đề báo cáo để truyền vào hàm copy hành vi onclick mà không gây vỡ dòng lệnh
            let fullReportTitle = clsObj.classNameKey;
            if (clsObj.scheduleAndTeacher) fullReportTitle += " - " + clsObj.scheduleAndTeacher;
            fullReportTitle += " (" + roomText + ")";

            if (studentMatch) {
                studentList = studentMatch.data.students;
            }

            const total = studentList.length;
            const absent = studentList.filter(s => s.status === 'absent').length;
            const present = total - absent;
            const safeId = `${dayKey}-${idx}`;

            const classSection = document.createElement("div");
            classSection.className = "class-block-wrapper";
            classSection.setAttribute("id", `class-wrapper-${safeId}`);
            classSection.setAttribute("data-classname-box", clsObj.classNameKey);

            classSection.innerHTML = `
                <div class="class-accordion-header" onclick="toggleAccordion(this)">
                    <div class="class-header-row">
                        <span class="class-main-title">${clsObj.classNameKey}</span>
                        ${clsObj.scheduleAndTeacher ? `<span class="class-extra-inline">- ${clsObj.scheduleAndTeacher}</span>` : ''}
                    </div>
                    <div class="class-schedule" style="white-space: pre-line;">${roomText}</div>
                    <div class="class-stats" id="stats-display-${safeId}">Sĩ số: ${total} | Có mặt: ${present} | Vắng: ${absent}</div>
                </div>
                
                <div class="class-panel">
                    <h3>Danh Sách Thành Viên Lớp</h3>
                    <br>
                    
                    <div class="add-student-box" style="display: none">
                        <input type="text" id="inputName-${safeId}" placeholder="Họ và tên học viên..." hidden>
                        <input type="tel" id="inputPhone-${safeId}" placeholder="Số điện thoại..." hidden>
                        <button class="btn-add" onclick="addNewStudentToUI('${clsObj.classNameKey}', '${safeId}')" hidden>+ Thêm học sinh</button>
                    </div>
                    
                    <div class="absent-section">
                        <div class="absent-header">
                            <span class="absent-title">HỌC VIÊN VẮNG MẶT HÔM NAY</span>
                            <button class="copy-btn" id="btnCopy-${safeId}">Copy nhanh</button>
                        </div>
                        <ul class="absent-list" id="absentList-${safeId}">
                            ${renderAbsentRowsHtml(studentList)}
                        </ul>
                    </div>
                    
                    <div class="student-list" id="studentList-${safeId}">
                        ${renderStudentCardsHtml(clsObj.classNameKey, safeId, studentList)}
                    </div>
                </div>
            `;
            
            // Xử lý sự kiện click của nút copy trực tiếp qua DOM để không bị dính lỗi cú pháp ký tự xuống dòng
            classSection.querySelector(`#btnCopy-${safeId}`).onclick = function(e) {
                e.stopPropagation();
                copyAbsentReport(clsObj.classNameKey, fullReportTitle);
            };

            classSection.querySelector('.class-panel').onclick = (e) => e.stopPropagation();
            groupPanel.appendChild(classSection);
        });
    });

    // Khôi phục lại trạng thái đóng/mở thẻ trước đó
    openedDomIds.forEach(id => {
        let target = document.getElementById(id);
        if (target) target.classList.add('active');
    });
}

function renderAbsentRowsHtml(students) {
    const absentStudents = students.filter(s => s.status === 'absent');
    if (absentStudents.length === 0) return '<li><em>Chưa ghi nhận học sinh vắng</em></li>';
    return absentStudents.map(s => `<li>• ${s.name} ${s.note ? '(' + s.note + ')' : '(Chưa rõ lý do)'}</li>`).join('');
}

function renderStudentCardsHtml(classNameKey, safeId, students) {
    if (students.length === 0) return '<div class="empty-alert">Không tìm thấy dữ liệu danh sách lớp từ các sheet khối. Bạn có thể thêm học sinh thủ công ở trên!</div>';
    
    return students.map((student, idx) => {
        const absentActive = student.status === 'absent' ? 'active' : '';
        const presentActive = student.status === 'present' ? 'active' : '';
        const cardId = `card-${safeId}-${student.id}`;

        return `
            <div class="student-card status-${student.status}" id="${cardId}">
                <div class="student-info-row">
                    <div class="student-meta">
                        <span class="student-name">${idx + 1}. ${student.name}</span>
                        <span class="student-phone">SĐT: ${student.phone && student.phone !== 'Chưa có' ? student.phone.substring(0, 4) + ' *** ' + student.phone.substring(7) : 'Chưa có'}</span>
                    </div>
                    <div class="student-actions-right">
                        <button class="btn-call" onclick="callPhoneAction('${student.phone}')">📞</button>
                        <button class="btn-delete" onclick="deleteStudent('${classNameKey}', ${student.id}, '${safeId}')">Xoá</button>
                    </div>
                </div>
                <div class="student-controls-row">
                    <button class="btn-action btn-absent ${absentActive}" onclick="updateStudentStatus('${classNameKey}', ${student.id}, 'absent')">Vắng</button>
                    <button class="btn-action btn-present ${presentActive}" onclick="updateStudentStatus('${classNameKey}', ${student.id}, 'present')">Đi Học</button>
                    <select class="note-select" onchange="updateStudentNote('${classNameKey}', ${student.id}, this.value)">
                        <option value="" ${student.note===''?'selected':''}>-- Ghi chú --</option>
                        <option value="***" ${student.note==='***'?'selected':''}>***</option>
                        <option value="Đi muộn" ${student.note==='Đi muộn'?'selected':''}>Đi muộn</option>
                        <option value="Không nghe máy" ${student.note==='Không nghe máy'?'selected':''}>Không nghe máy</option>
                        <option value="Nghỉ hôm nay" ${student.note==='Nghỉ hôm nay'?'selected':''}>Nghỉ hôm nay</option>
                        <option value="Ốm" ${student.note==='Ốm'?'selected':''}>Ốm đau</option>
                    </select>
                </div>
            </div>
        `;
    }).join('');
}

function toggleAccordion(element) {
    element.parentElement.classList.toggle('active');
}

function updateStudentStatus(classNameKey, studentId, status) {
    let match = findStudentDataMatch(classNameKey);
    if (match) {
        let student = match.data.students.find(s => s.id === studentId);
        if (student) {
            student.status = status;
            saveDatabaseState();
        }
    }
}

function updateStudentNote(classNameKey, studentId, value) {
    let match = findStudentDataMatch(classNameKey);
    if (match) {
        let student = match.data.students.find(s => s.id === studentId);
        if (student) {
            student.note = value;
            saveDatabaseState();
        }
    }
}

function addNewStudentToUI(classNameKey, safeId) {
    const nameInput = document.getElementById(`inputName-${safeId}`);
    const phoneInput = document.getElementById(`inputPhone-${safeId}`);
    const name = nameInput.value.trim();
    const phone = phoneInput.value.trim().replace(/\s+/g, '') || 'Chưa có';
    if (name === '') { alert('Vui lòng điền tên học sinh!'); return; }

    let match = findStudentDataMatch(classNameKey);
    if (!match) {
        let upper = classNameKey.toUpperCase();
        window.masterStudentsDatabase[upper] = { sheet: "Thêm thủ công", schedule: "", students: [] };
        match = { data: window.masterStudentsDatabase[upper] };
    }

    const studentsList = match.data.students;
    const nextId = studentsList.length > 0 ? Math.max(...studentsList.map(s => s.id)) + 1 : 1;
    studentsList.push({ id: nextId, name: name, phone: phone, status: 'present', note: '' });
    
    saveDatabaseState();
}

function deleteStudent(classNameKey, studentId, safeId) {
    let match = findStudentDataMatch(classNameKey);
    if (match && confirm("Bạn có chắc chắn muốn xóa học sinh này khỏi danh sách lớp học?")) {
        match.data.students = match.data.students.filter(s => s.id !== studentId);
        match.data.students.forEach((s, idx) => s.id = idx + 1);
        saveDatabaseState();
    }
}

function copyAbsentReport(classNameKey, titleText) {
    let match = findStudentDataMatch(classNameKey);
    if (!match) return;

    const students = match.data.students;
    const absentStudents = students.filter(s => s.status === 'absent');
    
    let report = `LỚP HỌC: ${titleText}\n`;
    report += `Sĩ số: ${students.length} (Vắng: ${absentStudents.length})\n`;
    report += `-------------------------\nDanh sách học sinh vắng:\n`;
    
    if (absentStudents.length === 0) {
        report += `- Lớp đi học đầy đủ.`;
    } else {
        absentStudents.forEach((s, i) => {
            report += `${i + 1}. ${s.name}${s.note ? ' (' + s.note + ')' : ' (Chưa rõ lý do)'}\n`;
        });
    }

    // Cơ chế copy an toàn tương thích mọi thiết bị di động
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(report).then(() => {
            alert('✅ Đã sao chép báo cáo vắng lớp ' + classNameKey);
        }).catch(err => {
            fallbackCopyText(report, classNameKey);
        });
    } else {
        fallbackCopyText(report, classNameKey);
    }
}

function fallbackCopyText(text, classNameKey) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    textArea.style.position = "fixed";
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    try {
        document.execCommand('copy');
        alert('✅ Đã sao chép báo cáo vắng lớp ' + classNameKey);
    } catch (err) {
        alert('Không thể sao chép dữ liệu, vui lòng cấp quyền cho trình duyệt.');
    }
    document.body.removeChild(textArea);
}

async function saveDatabaseState() {
    localStorage.setItem('master_students_db', JSON.stringify(window.masterStudentsDatabase));
    localStorage.setItem('day_schedules_struct', JSON.stringify(window.daySchedulesStructure));
    if (typeof window.saveToFirebase === "function") {
        await window.saveToFirebase();
    }
}

function callPhoneAction(phone) {
    if (!phone || phone === 'Chưa có') { alert('Chưa cập nhật SĐT!'); return; }
    window.location.href = 'tel:' + phone;
}

function searchGlobalStudent() {
    const keyword = document.getElementById('globalSearchInput').value.trim().toLowerCase();
    const resultBox = document.getElementById('searchResultBox');
    const resultBody = document.getElementById('resultTableBody');
    const resultCount = document.getElementById('resultCount');
    
    resultBody.innerHTML = "";
    resultBox.style.display = 'none';
    if (keyword === "") return;

    let matchCount = 0;
    let matchedKeys = new Set(); 

    Object.keys(window.masterStudentsDatabase).forEach(classKey => {
        window.masterStudentsDatabase[classKey].students.forEach(student => {
            if (student.name.toLowerCase().includes(keyword) || student.phone.toString().includes(keyword)) {
                matchCount++;
                matchedKeys.add(classKey); 
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: bold; color: #fff;">${student.name}</td>
                    <td style="color: #00ff66; font-family: monospace;">${displayPhone(student.phone)}</td>
                    <td style="color: #00f0ff; font-weight: bold; font-size:0.75rem;">${classKey}</td>
                    <td style="text-align:center;"><button class="btn-call" style="padding:4px 8px; font-size:0.8rem;" onclick="callPhoneAction('${student.phone}')">📞</button></td>
                `;
                resultBody.appendChild(tr);
            }
        });
    });

    if (matchCount > 0) {
        resultCount.innerText = `Tìm thấy ${matchCount} kết quả`;
        resultBox.style.display = 'block';
        
        matchedKeys.forEach(classKey => {
            document.querySelectorAll(`[data-classname-box="${classKey}"]`).forEach(cw => {
                cw.classList.add('active');
                cw.parentElement.parentElement.classList.add('active'); 
            });
        });
    } else {
        alert("Không tìm thấy kết quả phù hợp.");
    }
}

function handleSearchKeyPress(event) {
    if (event.key === 'Enter') searchGlobalStudent();
}

function clearSystemCache() {
    if (confirm("Xóa toàn bộ dữ liệu lưu trữ trên hệ thống đám mây đám mây?")) {
        localStorage.clear();
        window.masterStudentsDatabase = {};
        Object.keys(window.daySchedulesStructure).forEach(k => window.daySchedulesStructure[k].classes = []);
        window.renderSystemUIByDay();
        if (typeof window.saveToFirebase === "function") {
            window.saveToFirebase();
        }
        document.getElementById('fileStatusMessage').innerText = "Chưa có dữ liệu học viên. Vui lòng chọn tệp Excel.";
    }
}
</script>

<!-- MODULE PHỤ TRÁCH LIÊN KẾT DỮ LIỆU THỜI GIAN THỰC (REALTIME SYNC) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbCF0pFsdXqD14Y-wjWLFoNCGfP1LBlD8",
  authDomain: "tienganhhavi-12b54.firebaseapp.com",
  projectId: "tienganhhavi-12b54",
  storageBucket: "tienganhhavi-12b54.firebasestorage.app",
  messagingSenderId: "208059039650",
  appId: "1:208059039650:web:d272318418e01d0f50fcfb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Đẩy dữ liệu lên Firebase
window.saveToFirebase = async function () {
    try {
        await setDoc(doc(db, "system", "database_v3_by_column"), {
            database: window.masterStudentsDatabase,
            structure: window.daySchedulesStructure,
            filename: localStorage.getItem("big_classes_filename") || "",
            updatedAt: new Date().toISOString()
        });
    } catch (err) { console.error("Lỗi đồng bộ dữ liệu lên Firebase: ", err); }
}

// ⚡ LẮNG NGHE THỜI GIAN THỰC (REALTIME LISTENER): Tự động phát hiện biến động dữ liệu trên máy khác sau 0.5s
onSnapshot(doc(db, "system", "database_v3_by_column"), (docSnap) => {
    if (docSnap.exists()) {
        const data = docSnap.data();
        window.masterStudentsDatabase = data.database || {};
        window.daySchedulesStructure = data.structure || window.daySchedulesStructure;
        
        localStorage.setItem("master_students_db", JSON.stringify(window.masterStudentsDatabase));
        localStorage.setItem("day_schedules_struct", JSON.stringify(window.daySchedulesStructure));
        
        // Cập nhật lại giao diện ngay tức thì
        window.renderSystemUIByDay();
        
        let countTotal = 0;
        Object.keys(window.masterStudentsDatabase).forEach(k => countTotal += window.masterStudentsDatabase[k].students.length);
        if(countTotal > 0) {
            document.getElementById('fileStatusMessage').innerText = `🔥 Hệ thống đang liên kết thiết bị trực tuyến.\nTổng số: ${countTotal} học sinh toàn hệ thống.`;
        }
    } else {
        loadLocalCacheBackup();
    }
}, (err) => {
    console.error("Lỗi lắng nghe Firebase Realtime:", err);
    loadLocalCacheBackup();
});
</script>
