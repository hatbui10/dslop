<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Lọc Học Viên Điểm Danh Chia Lớp</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #050508; color: #e0e0e6; padding: 20px 8px; max-width: 600px; margin: 0 auto; }
        
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; color: #00f0ff; text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); font-size: 1.4rem; }
        h3 { color: #ff007f; text-shadow: 0 0 10px rgba(255, 0, 127, 0.5); font-size: 1.1rem; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        
        /* 📂 KHU VỰC TẢI FILE */
        .upload-card { background: #0a0a14; border: 1px solid #ffd700; border-radius: 6px; padding: 15px 10px; margin-bottom: 15px; box-shadow: 0 0 10px rgba(255, 215, 0, 0.1); }
        .upload-card p { font-size: 0.85rem; color: #aaa; text-align: center; margin-bottom: 12px; }
        
        .btn-group-top { width: 100%; display: block; text-align: center; margin-bottom: 5px; }
        
        /* Định dạng nút Tải lên */
        .custom-upload-btn { 
            display: inline-block; 
            width: 48%; 
            background: transparent; 
            border: 1px solid #00f0ff; 
            color: #00f0ff; 
            padding: 12px 5px; 
            font-weight: bold; 
            font-size: 0.85rem; 
            border-radius: 4px; 
            cursor: pointer; 
            text-transform: uppercase; 
            text-align: center;
            margin-right: 2%;
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.2);
        }
        .custom-upload-btn:active { background: #00f0ff; color: #000; }
        
        /* Định dạng nút Xóa hết cũ */
        .btn-danger-top { 
            display: inline-block; 
            width: 48%; 
            background: transparent; 
            border: 1px solid #ff007f; 
            color: #ff007f; 
            padding: 12px 5px; 
            font-weight: bold; 
            font-size: 0.85rem; 
            border-radius: 4px; 
            cursor: pointer; 
            text-transform: uppercase; 
            text-align: center;
            box-shadow: 0 0 8px rgba(255, 0, 127, 0.2);
        }
        .btn-danger-top:active { background: #ff007f; color: #fff; }
        
        .file-status { font-size: 0.85rem; color: #ffd700; text-align: center; margin-top: 12px; font-weight: bold; line-height: 1.3; }
        
        /* ⏳ PROGRESS BAR */
        .progress-container { width: 100%; background-color: #050508; border: 1px solid #333; border-radius: 4px; margin: 10px 0; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 16px; background-color: #00ff66; text-align: center; line-height: 16px; color: #000; font-weight: bold; font-size: 0.75rem; transition: width 0.1s ease; box-shadow: 0 0 10px #00ff66; }

        /* 🔍 KHU VỰC TÌM KIẾM HỌC VIÊN CHUNG */
        .search-box { display: block; background: #0d0d1a; border: 1px solid #333; border-radius: 4px; padding: 10px; margin-bottom: 15px; text-align: center; }
        .search-input { width: 73%; background: #050508; border: 1px solid #333; color: #fff; padding: 10px; font-size: 0.9rem; border-radius: 4px; outline: none; margin-right: 2%; display: inline-block; vertical-align: middle; }
        .search-input:focus { border-color: #ffd700; }
        .search-btn { width: 23%; background: #ffd700; color: #000; border: none; padding: 11px 0; font-weight: bold; font-size: 0.85rem; border-radius: 4px; cursor: pointer; text-transform: uppercase; display: inline-block; vertical-align: middle; }

        /* 📊 KẾT QUẢ TÌM KIẾM TRÊN BẢNG */
        .search-result-panel { background: #1a0813; border: 1px dashed #ff007f; border-radius: 4px; padding: 12px 8px; margin-bottom: 15px; display: none; }
        .result-title { color: #ff007f; font-weight: bold; font-size: 0.9rem; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .result-table { width: 100%; border-collapse: collapse; }
        .result-table th, .result-table td { border: 1px solid rgba(255, 0, 127, 0.2); padding: 8px 5px; text-align: left; font-size: 0.8rem; }
        .result-table th { background-color: #4a0025; color: #fff; text-transform: uppercase; font-size: 0.75rem; }
        .result-table tr:nth-child(even) { background-color: rgba(255, 0, 127, 0.03); }

        /* 🏫 KHỐI GIAO DIỆN CHÍNH & ACCORDION */
        .class-block-wrapper { margin-bottom: 15px; background: #0a0a14; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
        
        /* Tiêu đề đóng vai trò là Nút Accordion kích hoạt click */
        .class-accordion-header { padding: 12px 10px; background: #0d0d1f; cursor: pointer; user-select: none; transition: background 0.2s; position: relative; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .class-accordion-header:active { background: #151530; }
        .class-accordion-header::after { content: '▼'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #00f0ff; font-size: 0.8rem; transition: transform 0.3s; }
        
        /* Xoay mũi tên khi mở lớp */
        .class-block-wrapper.active .class-accordion-header::after { content: '▲'; color: #ffd700; }
        
        .class-sheet-badge { display: inline-block; background: #4a0025; color: #ff007f; border: 1px solid #ff007f; font-size: 0.7rem; font-weight: bold; padding: 1px 6px; border-radius: 3px; margin-bottom: 4px; text-transform: uppercase; }
        .class-main-title { color: #00f0ff; text-shadow: 0 0 10px rgba(0, 240, 255, 0.3); font-size: 1.15rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .class-stats { text-align: left; color: #ffd700; font-size: 0.85rem; margin-top: 3px; font-weight: 500; }
        
        /* Panel chứa nội dung chi tiết của lớp - Ẩn mặc định */
        .class-panel { padding: 15px 8px; display: none; background: #0a0a14; }
        .class-block-wrapper.active .class-panel { display: block; }
        
        .add-student-box { display: flex; flex-direction: column; gap: 8px; background: #0d0d1a; border: 1px solid #ffd700; border-radius: 4px; padding: 12px 10px; margin-bottom: 15px; }
        .add-student-box input { width: 100%; background: #050508; border: 1px solid #333; color: #fff; padding: 10px; font-size: 0.9rem; border-radius: 4px; outline: none; }
        .add-student-box input:focus { border-color: #ffd700; }
        .btn-add { background: #ffd700; color: #000; border: none; padding: 10px; font-weight: bold; font-size: 0.9rem; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        
        .absent-section { background: rgba(255, 0, 127, 0.05); border: 1px dashed #ff007f; border-radius: 4px; padding: 10px; margin-bottom: 20px; }
        .absent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .absent-title { color: #ff007f; font-weight: bold; font-size: 0.9rem; }
        .copy-btn { background: #ff007f; color: #fff; border: none; padding: 6px 12px; font-size: 0.8rem; font-weight: bold; border-radius: 3px; cursor: pointer; box-shadow: 0 0 8px #ff007f; }
        .absent-list { list-style: none; font-size: 0.9rem; color: #ff55a5; line-height: 1.4; }
        .absent-list li { padding: 3px 0; border-bottom: 1px solid rgba(255, 0, 127, 0.1); }
        
        .student-list { display: flex; flex-direction: column; gap: 10px; }
        .student-card { background: #121224; border: 1px solid #333; border-left: 4px solid #00f0ff; border-radius: 4px; padding: 12px 10px; display: flex; flex-direction: column; gap: 10px; transition: background 0.2s; }
        .student-card.status-absent { border-left-color: #ff007f; background: #1a0813; }
        .student-card.status-present { border-left-color: #00ff66; background: #081a10; }
        .student-card.highlight-search { border: 1px solid #ffd700 !important; box-shadow: 0 0 12px rgba(255, 215, 0, 0.4); }
        
        .student-info-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; border-bottom: 1px solid #222; padding-bottom: 6px; }
        .student-meta { display: flex; flex-direction: column; gap: 2px; flex: 1; }
        .student-name { font-weight: bold; font-size: 0.95rem; color: #fff; }
        .student-phone { font-size: 0.8rem; color: #888; }
        
        .student-actions-right { display: flex; gap: 5px; }
        .btn-call { background: #ffd700; color: #000; padding: 8px 12px; font-size: 0.9rem; border: none; border-radius: 4px; cursor: pointer; box-shadow: 0 0 5px #ffd700; }
        .btn-delete { background: #4a0000; color: #ff3333; border: 1px solid #ff3333; padding: 8px 10px; font-size: 0.9rem; border-radius: 4px; cursor: pointer; }
        
        .student-controls-row { display: flex; gap: 6px; align-items: center; }
        .btn-action { flex: 1; padding: 10px 3px; font-size: 0.8rem; font-weight: bold; border: none; border-radius: 3px; cursor: pointer; text-align: center; color: #fff; background: #333; }
        .btn-absent { background: #4a0025; color: #ff007f; border: 1px solid #ff007f; }
        .btn-absent.active { background: #ff007f; color: #fff; box-shadow: 0 0 10px #ff007f; }
        .btn-present { background: #003311; color: #00ff66; border: 1px solid #00ff66; }
        .btn-present.active { background: #00ff66; color: #000; box-shadow: 0 0 10px #00ff66; }
        .note-select { flex: 1.5; background: #1a1a3a; color: #00f0ff; border: 1px solid #00f0ff; padding: 9px 3px; font-size: 0.8rem; border-radius: 3px; outline: none; }
        
        .empty-alert { text-align: center; padding: 40px 10px; color: #555; font-style: italic; font-size: 0.95rem; }
    </style>
</head>
<body>

<h2>HỆ THỐNG QUẢN LÝ ĐIỂM DANH ĐỘNG</h2>

<div class="upload-card">
  
    
    <div class="btn-group-top">
        <label for="excelFileInput" class="custom-upload-btn">📂 Tải lên File Excel</label>
        <input type="file" id="excelFileInput" accept=".xlsx, .xls" style="display: none;" onchange="startProcessingExcel(this)">
        
        <button class="btn-danger-top" onclick="clearSystemCache()">🗑️ XÓA dữ liệu CŨ</button>
    </div>
    
    <div id="fileStatusMessage" class="file-status">Chưa có dữ liệu học viên. Vui lòng chọn tệp Excel.</div>
</div>

<div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar">0%</div>
</div>

<div class="search-box">
    <input type="text" id="globalSearchInput" class="search-input" placeholder="Nhập tên hoặc số điện thoại để tìm nhanh..." onkeypress="handleSearchKeyPress(event)">
    <button class="search-btn" onclick="searchGlobalStudent()">Tìm Kiếm</button>
</div>

<div id="searchResultBox" class="search-result-panel">
    <div class="result-title">
        <span>🔍 KẾT QUẢ TÌM KIẾM TOÀN HỆ THỐNG:</span>
        <span id="resultCount" style="color: #ffd700;"></span>
    </div>
    <table class="result-table">
        <thead>
            <tr>
                <th>Họ và Tên</th>
                <th>SĐT</th>
                <th>Lớp Học</th>
                <th>Gọi</th>
            </tr>
        </thead>
        <tbody id="resultTableBody"></tbody>
    </table>
</div>

<div id="dynamicMainContainer">
    <div class="empty-alert">Danh sách trống. Hệ thống sẽ tự động vẽ giao diện HTML 1 sau khi bạn nạp file Excel thành công!</div>
</div>

<script>
const targetSheets = ["SV", "12", "11", "10", "9", "8", "7", "6", "5", "4", "3", "2", "DH25", "DH26"];
let bigClassesDatabase = {};

function displayPhone(p) { 
    if(!p || p === 'Chưa có' || p === 'undefined') return 'Chưa có'; 
    let c = p.toString().replace(/\s+/g, ''); 
    if(c.length === 10) return c.substring(0,4) + ' ' + c.substring(4,7) + ' ' + c.substring(7); 
    return p; 
}

// KHỞI CHẠY KHÔI PHỤC DỮ LIỆU TỪ BỘ NHỚ TRÌNH DUYỆT
window.onload = function() {
    const cachedData = localStorage.getItem('big_classes_database');
    const cachedFileName = localStorage.getItem('big_classes_filename');
    
    if (cachedData) {
        bigClassesDatabase = JSON.parse(cachedData);
        
        // Đếm tổng số học viên trong cache
        let totalCount = 0;
        Object.keys(bigClassesDatabase).forEach(k => {
            totalCount += bigClassesDatabase[k].students.length;
        });

        document.getElementById('fileStatusMessage').style.color = "#00ff66";
        document.getElementById('fileStatusMessage').innerText = `✅ Đã khôi phục lớp từ bộ nhớ (${totalCount} học viên): ${cachedFileName || "Ẩn danh"}`;
        renderFullSystemUI();
    }
};

// THUẬT TOÁN ĐỌC FILE EXCEL & TỰ ĐỘNG PHÂN TÁCH LỚP HỌC ĐỘNG CHUẨN XÁC
function startProcessingExcel(input) {
    const file = input.files[0];
    if (!file) return;

    document.getElementById('fileStatusMessage').style.color = "#ffd700";
    document.getElementById('fileStatusMessage').innerText = `Đang xử lý phân tách lớp từ tệp: ${file.name}...`;
    document.getElementById('searchResultBox').style.display = 'none';
    
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    progressContainer.style.display = 'block';
    progressBar.style.width = '0%';
    progressBar.innerText = '0%';

    bigClassesDatabase = {}; 

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array', cellStyles: true });
            
            const sheetsToProcess = workbook.SheetNames.filter(name => targetSheets.includes(name.trim()));
            
            if (sheetsToProcess.length === 0) {
                alert("Không tìm thấy các sheet mục tiêu (SV, 12, 11... DH26) trong file Excel của bạn!");
                progressContainer.style.display = 'none';
                return;
            }






           let totalSheets = sheetsToProcess.length;
            let currentSheetIdx = 0;

            function parseSheetStep() {
                if (currentSheetIdx >= totalSheets) {
                    progressBar.style.width = '100%';
                    progressBar.innerText = '100% Hoàn thành';
                    
                    // Tính tổng học sinh sau khi quét xong toàn bộ file
                    let totalStudentsCount = 0;
                    Object.keys(bigClassesDatabase).forEach(classKey => {
                        totalStudentsCount += bigClassesDatabase[classKey].students.length;
                    });

                    document.getElementById('fileStatusMessage').style.color = "#00ff66";
                    document.getElementById('fileStatusMessage').innerText = `✅ Nạp thành công! Tìm thấy tổng cộng ${totalStudentsCount} học viên. Đã vẽ xong Form Quản Lý cho tất cả các lớp.`;
                    
                    localStorage.setItem('big_classes_database', JSON.stringify(bigClassesDatabase));
                    localStorage.setItem('big_classes_filename', file.name);
                    
                    renderFullSystemUI();
                    return;
                }

                let percent = Math.round((currentSheetIdx / totalSheets) * 100);
                progressBar.style.width = percent + '%';
                progressBar.innerText = percent + '%';

                const sheetName = sheetsToProcess[currentSheetIdx];
                const sheet = workbook.Sheets[sheetName];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });
////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
                if (rows.length > 0) {
                    const colAIndex = 0;
                    const colBIndex = 1;
                    const colPIndex = 16;

                    let detectedClassName = "";
                    let detectedSchedule = "";
                    let previousText = "";
                    let readingStudents = false;

                    rows.forEach((row) => {
                        if (!row) return;

                        let cellA = row[colAIndex] ? row[colAIndex].toString().trim() : "";
                        let cellB = row[colBIndex] ? row[colBIndex].toString().trim() : "";
                        let cellP = row[colPIndex] ? row[colPIndex].toString().trim() : "";

                        let cellB_lower = cellB.toLowerCase();

                        let cleanPhone = cellP.replace(/[^0-9]/g, "");
                        if (cleanPhone.length === 9 && !cleanPhone.startsWith("0")) {
                            cleanPhone = "0" + cleanPhone;
                        }

                        if (
                            cellB === "" ||
                            cellB_lower === "tên học sinh" ||
                            cellB_lower === "tên hs" ||
                            cellB_lower === "họ và tên"
                        ) {
                            return;
                        }

                        const isSchedule =
                            /^t[2-7]/i.test(cellB) ||
                            /^cn/i.test(cellB) ||
                            /18h|19h|20h/i.test(cellB) ||
                            cellB.includes("THỨ");

                        if (isSchedule) {
                            if (previousText) {
                                detectedClassName = previousText;
                            }
                            detectedSchedule = cellB;   // Lưu lịch học
                            readingStudents = true;
                            return;
                        }

                        if (readingStudents) {
                            if (
                                cellB &&
                                !/^\d+$/.test(cellB) &&
                                cleanPhone.length >= 9 &&
                                cleanPhone.length <= 11
                            ) {
                                let currentClassKey = detectedClassName || `Chung Khối - ${sheetName}`;

                                if (!bigClassesDatabase[currentClassKey]) {
                                    bigClassesDatabase[currentClassKey] = {
                                        sheet: sheetName,
                                        schedule: detectedSchedule,
                                        students: []
                                    };
                                }

                                bigClassesDatabase[currentClassKey].students.push({
                                    id: bigClassesDatabase[currentClassKey].students.length + 1,
                                    name: cellB,
                                    phone: cleanPhone,
                                    status: "present",
                                    note: ""
                                });
                                return;
                            }

                            if (cellB && cleanPhone.length < 9) {
                                readingStudents = false;
                                previousText = cellB;
                                return;
                            }
                            return;
                        }

                        if (cellB && cleanPhone.length < 9) {
                            previousText = cellB;
                        }
                    });
                }
                




/////////////////////////////////////////////////////////////////////////////////////////////////////
                // Chuyển sang sheet tiếp theo và gọi đệ quy bằng setTimeout để không bị block UI
                currentSheetIdx++;
                setTimeout(parseSheetStep, 10);
            }

            // Gọi hàm bắt đầu xử lý sheet đầu tiên
            parseSheetStep();
            
        } catch (err) {
            console.error(err);
            alert("Lỗi khi đọc dữ liệu từ file Excel!");
            document.getElementById('progressContainer').style.display = 'none';
        }
    };
    reader.readAsArrayBuffer(file);
}

// HÀM CLICK ĐÓNG MỞ ACCORDION
function toggleClassAccordion(headerElement) {
    const wrapper = headerElement.parentElement;
    wrapper.classList.toggle('active');
}

// HÀM VẼ TOÀN BỘ HỆ THỐNG GIAO DIỆN MỚI TÍCH HỢP ACCORDION
function renderFullSystemUI() {
    const mainContainer = document.getElementById("dynamicMainContainer");
    mainContainer.innerHTML = "";

    const classKeys = Object.keys(bigClassesDatabase);
    if (classKeys.length === 0) {
        mainContainer.innerHTML = '<div class="empty-alert">Danh sách trống. Hệ thống sẽ tự động vẽ giao diện HTML 1 sau khi bạn nạp file Excel thành công!</div>';
        return;
    }

    classKeys.forEach(classKey => {
        const classObj = bigClassesDatabase[classKey];
        const students = classObj.students;
        
        const total = students.length;
        const absent = students.filter(s => s.status === 'absent').length;
        const present = total - absent;

        const classSection = document.createElement("div");
        classSection.className = "class-block-wrapper";
        classSection.setAttribute("data-classname-box", classKey);

        classSection.innerHTML = `
            <div class="class-accordion-header" onclick="toggleClassAccordion(this)">
             
                <div class="class-main-title">Lớp: ${classKey}</div>
<div class="class-schedule">
    ${classObj.schedule || ""}
</div>
                <div class="class-stats" id="stats-${classKey.replace(/\s+/g, '-')}">Sĩ số: ${total} | Có mặt: ${present} | Vắng: ${absent}</div>
            </div>
            
            <div class="class-panel">
                <h3>Danh Sách Chi Tiết</h3>
                <br>
                
                <div class="add-student-box">
                    <input type="text" id="inputName-${classKey.replace(/\s+/g, '-')}" placeholder="Dòng 1: Nhập họ và tên...">
                    <input type="tel" id="inputPhone-${classKey.replace(/\s+/g, '-')}" placeholder="Dòng 2: Nhập số điện thoại...">
                    <button class="btn-add" onclick="addNewStudentToClass('${classKey}')">+ Thêm vào danh sách</button>
                </div>
                
                <div class="absent-section">
                    <div class="absent-header">
                        <span class="absent-title">DANH SÁCH VẮNG HÔM NAY</span>
                        <button class="copy-btn" onclick="copyAbsentReport('${classKey}')">Copy</button>
                    </div>
                    <ul class="absent-list" id="absentList-${classKey.replace(/\s+/g, '-')}">
                        ${renderAbsentRowsHtml(students)}
                    </ul>
                </div>
                
                <div class="student-list" id="studentList-${classKey.replace(/\s+/g, '-')}">
                    ${renderStudentCardsHtml(classKey, students)}
                </div>
            </div>
        `;
        mainContainer.appendChild(classSection);
    });
}

function renderAbsentRowsHtml(students) {
    const absentStudents = students.filter(s => s.status === 'absent');
    if (absentStudents.length === 0) return '<li><em>Chưa có học sinh vắng</em></li>';
    return absentStudents.map(s => `<li>• ${s.name} ${s.note ? '(' + s.note + ')' : '(Chưa rõ lý do)'}</li>`).join('');
}

function renderStudentCardsHtml(classKey, students) {
    return students.map((student, idx) => {
        const absentActive = student.status === 'absent' ? 'active' : '';
        const presentActive = student.status === 'present' ? 'active' : '';
        const cardId = `card-${classKey.replace(/\s+/g, '-')}-${student.id}`;

        return `
            <div class="student-card status-${student.status}" id="${cardId}">
                <div class="student-info-row">
                    <div class="student-meta">
                        <span class="student-name">${idx + 1}. ${student.name}</span>
                        <span class="student-phone">SĐT: ${displayPhone(student.phone)}</span>
                    </div>
                    <div class="student-actions-right">
                        <button class="btn-call" onclick="callPhoneAction('${student.phone}')">📞</button>
                        <button class="btn-delete" onclick="deleteStudentFromClass('${classKey}', ${student.id}, '${student.name.replace(/'/g, "\\'")}')">🗑️</button>
                    </div>
                </div>
                <div class="student-controls-row">
                    <button class="btn-action btn-absent ${absentActive}" onclick="updateStudentStatus('${classKey}', ${student.id}, 'absent')">Vắng</button>
                    <button class="btn-action btn-present ${presentActive}" onclick="updateStudentStatus('${classKey}', ${student.id}, 'present')">Đi Học</button>
                    <select class="note-select" onchange="updateStudentNote('${classKey}', ${student.id}, this.value)">
                        <option value="" ${student.note===''?'selected':''}>-- Ghi chú --</option>
                        <option value="***" ${student.note==='***'?'selected':''}>***</option>
                        <option value="Đi muộn" ${student.note==='Đi muộn'?'selected':''}>Đi muộn</option>
                        <option value="Không nghe máy" ${student.note==='Không nghe máy'?'selected':''}>Không nghe máy</option>
                        <option value="Nghỉ hôm nay" ${student.note==='Nghỉ hôm nay'?'selected':''}>Nghỉ hôm nay</option>
                        <option value="Nghỉ tuần này" ${student.note==='Nghỉ tuần này'?'selected':''}>Nghỉ tuần này</option>
                        <option value="Khi nào đi học sẽ báo lại" ${student.note==='Khi nào đi học sẽ báo lại'?'selected':''}>Khi nào đi học sẽ báo lại</option>
                        <option value="Nghỉ hết tháng 7" ${student.note==='Nghỉ hết tháng 7'?'selected':''}>Nghỉ hết tháng 7</option>
                        <option value="Xin nghỉ hẳn" ${student.note==='Xin nghỉ hẳn'?'selected':''}>Xin nghỉ hẳn</option>
                        <option value="Ốm" ${student.note==='Ốm'?'selected':''}>Ốm đau</option>
                    </select>
                </div>
            </div>
        `;
    }).join('');
}

function updateStudentStatus(classKey, studentId, status) {
    let student = bigClassesDatabase[classKey].students.find(s => s.id === studentId);
    if (student) {
        student.status = status;
        saveDatabaseState();
        
        const classKeyId = classKey.replace(/\s+/g, '-');
        const studentsArr = bigClassesDatabase[classKey].students;
        
        const total = studentsArr.length;
        const absent = studentsArr.filter(s => s.status === 'absent').length;
        const present = total - absent;
        
        document.getElementById(`stats-${classKeyId}`).innerText = 'Sĩ số: ' + total + ' | Có mặt: ' + present + ' | Vắng: ' + absent;
        document.getElementById(`absentList-${classKeyId}`).innerHTML = renderAbsentRowsHtml(studentsArr);
        document.getElementById(`studentList-${classKeyId}`).innerHTML = renderStudentCardsHtml(classKey, studentsArr);
    }
}

function updateStudentNote(classKey, studentId, value) {
    let student = bigClassesDatabase[classKey].students.find(s => s.id === studentId);
    if (student) {
        student.note = value;
        saveDatabaseState();
        document.getElementById(`absentList-${classKey.replace(/\s+/g, '-')}`).innerHTML = renderAbsentRowsHtml(bigClassesDatabase[classKey].students);
    }
}

function addNewStudentToClass(classKey) {
    const classIdStr = classKey.replace(/\s+/g, '-');
    const nameInput = document.getElementById(`inputName-${classIdStr}`);
    const phoneInput = document.getElementById(`inputPhone-${classIdStr}`);
    
    const name = nameInput.value.trim();
    const phone = phoneInput.value.trim().replace(/\s+/g, '') || 'Chưa có';

    if (name === '') { alert('Vui lòng nhập tên học viên!'); return; }

    const studentsList = bigClassesDatabase[classKey].students;
    const nextId = studentsList.length > 0 ? Math.max(...studentsList.map(s => s.id)) + 1 : 1;
    
    studentsList.push({ id: nextId, name: name, phone: phone, status: 'present', note: '' });
    saveDatabaseState();
    
    nameInput.value = '';
    phoneInput.value = '';
    
    const total = studentsList.length;
    const absent = studentsList.filter(s => s.status === 'absent').length;
    const present = total - absent;
    document.getElementById(`stats-${classIdStr}`).innerText = 'Sĩ số: ' + total + ' | Có mặt: ' + present + ' | Vắng: ' + absent;
    document.getElementById(`absentList-${classIdStr}`).innerHTML = renderAbsentRowsHtml(studentsList);
    document.getElementById(`studentList-${classIdStr}`).innerHTML = renderStudentCardsHtml(classKey, studentsList);
}

function deleteStudentFromClass(classKey, studentId, studentName) {
    if (confirm(`Bạn có chắc chắn muốn XÓA học sinh [${studentName}] ra khỏi danh sách lớp [${classKey}]?`)) {
        bigClassesDatabase[classKey].students = bigClassesDatabase[classKey].students.filter(s => s.id !== studentId);
        bigClassesDatabase[classKey].students.forEach((s, idx) => { s.id = idx + 1; });
        saveDatabaseState();
        
        const classIdStr = classKey.replace(/\s+/g, '-');
        const studentsList = bigClassesDatabase[classKey].students;
        const total = studentsList.length;
        const absent = studentsList.filter(s => s.status === 'absent').length;
        const present = total - absent;
        
        document.getElementById(`stats-${classIdStr}`).innerText = 'Sĩ số: ' + total + ' | Có mặt: ' + present + ' | Vắng: ' + absent;
        document.getElementById(`absentList-${classIdStr}`).innerHTML = renderAbsentRowsHtml(studentsList);
        document.getElementById(`studentList-${classIdStr}`).innerHTML = renderStudentCardsHtml(classKey, studentsList);
    }
}

function copyAbsentReport(classKey) {
    const students = bigClassesDatabase[classKey].students;
    const total = students.length;
    const absentStudents = students.filter(s => s.status === 'absent');
    const absentCount = absentStudents.length;
    const presentCount = total - absentCount;

    let text = 'LỚP: ' + classKey + '\n';
    text += 'Sĩ số: ' + total + ' (Có mặt: ' + presentCount + ' | Vắng: ' + absentCount + ')\n-------------------------\nDanh sách vắng:\n';
    
    if (absentCount === 0) {
        text += '- Lớp đi học đủ.';
    } else {
        absentStudents.forEach((s, idx) => {
            const note = s.note ? ' (' + s.note + ')' : '';
            text += (idx + 1) + '. ' + s.name + note + '\n';
        });
    }

    navigator.clipboard.writeText(text).then(() => {
        alert('Đã copy báo cáo lớp ' + classKey + '!');
    }).catch(() => alert('Lỗi không thể tự động copy.'));
}

function saveDatabaseState() {
    localStorage.setItem('big_classes_database', JSON.stringify(bigClassesDatabase));
}

function callPhoneAction(phone) {
    if (!phone || phone === 'Chưa có') { alert('Chưa cập nhật SĐT học viên!'); return; }
    window.location.href = 'tel:' + phone;
}

// KHU VỰC TÌM KIẾM TOÀN CỤC THÔNG MINH - CẬP NHẬT TỰ ĐỘNG MỞ ACCORDION KHI TÌM THẤY HỌC VIÊN
function searchGlobalStudent() {
    const keyword = document.getElementById('globalSearchInput').value.trim().toLowerCase();
    const resultBox = document.getElementById('searchResultBox');
    const resultBody = document.getElementById('resultTableBody');
    const resultCount = document.getElementById('resultCount');
    
    resultBody.innerHTML = "";
    resultBox.style.display = 'none';
    
    document.querySelectorAll('.student-card').forEach(card => card.classList.remove('highlight-search'));

    if (keyword === "") return;
    let keywordNoSpace = keyword.replace(/\s+/g, "");

    let matchCount = 0;
    let firstScrolledTargetId = null;
    let matchedClasses = new Set(); // Lưu danh sách các lớp có kết quả tìm kiếm

    Object.keys(bigClassesDatabase).forEach(classKey => {
        const students = bigClassesDatabase[classKey].students;
        
        students.forEach(student => {
            const nameLower = student.name.toLowerCase();
            const phoneTho = student.phone.toString();
            
            if (nameLower.includes(keyword) || nameLower.replace(/\s+/g, "").includes(keywordNoSpace) || phoneTho.includes(keyword)) {
                matchCount++;
                matchedClasses.add(classKey); // Đánh dấu lớp này có học viên trùng khớp
                
                const cardDomId = `card-${classKey.replace(/\s+/g, '-')}-${student.id}`;
                if (!firstScrolledTargetId) firstScrolledTargetId = cardDomId;
                
                const targetCardDom = document.getElementById(cardDomId);
                if (targetCardDom) targetCardDom.classList.add('highlight-search');

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: bold; color: #fff;">${student.name}</td>
                    <td style="color: #00ff66; font-family: monospace;">${displayPhone(student.phone)}</td>
                    <td style="color: #00f0ff; font-weight: bold; font-size:0.75rem;">${classKey}</td>
                    <td style="text-align:center;"><button class="btn-call" style="padding:4px 8px; font-size:0.8rem;" onclick="callPhoneAction('${student.phone}')">📞</button></td>
                `;
                resultBody.appendChild(tr);
            }
        });
    });

    if (matchCount > 0) {
        resultCount.innerText = `Tìm thấy ${matchCount} kết quả`;
        resultBox.style.display = 'block';
        
        // TỰ ĐỘNG MỞ ACCORDION CỦA CÁC LỚP CÓ KẾT QUẢ TÌM KIẾM
        matchedClasses.forEach(classKey => {
            const classWrapper = document.querySelector(`[data-classname-box="${classKey}"]`);
            if (classWrapper) {
                classWrapper.classList.add('active'); // Mở accordion
            }
        });
        
        // Cuộn màn hình đến học viên đầu tiên tìm thấy
        if (firstScrolledTargetId) {
            setTimeout(() => {
                const element = document.getElementById(firstScrolledTargetId);
                if(element) {
                    element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 100); // Trì hoãn nhẹ để DOM mở ra kịp thời
        }
    } else {
        alert("Không tìm thấy học viên nào khớp với từ khóa tìm kiếm.");
    }
}

function handleSearchKeyPress(event) {
    if (event.key === 'Enter') { searchGlobalStudent(); }
}

function clearSystemCache() {
    if (confirm("Bạn có chắc chắn muốn xóa toàn bộ danh sách lớp học hiện tại khỏi bộ nhớ trình duyệt?")) {
        localStorage.removeItem('big_classes_database');
        localStorage.removeItem('big_classes_filename');
        bigClassesDatabase = {};
        renderFullSystemUI();
        document.getElementById('fileStatusMessage').style.color = "#ffd700";
        document.getElementById('fileStatusMessage').innerText = "Chưa có dữ liệu học viên. Vui lòng chọn tệp Excel.";
    }
}
